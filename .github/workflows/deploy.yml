name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clozeflow/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: clozeflow

      - name: Build
        env:
          BASE_PATH: '/ClozeFlow'
        run: npm run build
        working-directory: clozeflow

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'clozeflow/build'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
